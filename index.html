<style>
:root {
  --black:  #090909;
  --white:  #f5f2ec;
  --acid:   #c8f23a;
  --paper:  #f7f3ec;
  --red:    #8b1a1a;
  --muted:  #444;
  --border: #1a1a1a;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'Fraunces', serif;
  --font-serif:   'Lora', serif;
  --font-mono:    'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow: hidden;
  cursor: none;
}

/* ---- CURSOR ---- */
.cursor {
  width: 8px; height: 8px;
  background: var(--acid);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width 0.25s, height 0.25s, background 0.25s, border-radius 0.25s;
}
.cursor.big {
  width: 48px; height: 48px;
  background: transparent;
  border: 1px solid rgba(200,242,58,0.5);
}

/* ---- SCANLINE ---- */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.018) 3px, rgba(0,0,0,0.018) 4px
  );
  pointer-events: none; z-index: 9990;
}

/* ---- LOADER ---- */
.loader {
  position: fixed; inset: 0;
  background: var(--black);
  z-index: 10000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1.5rem;
}
.loader-word {
  font-family: var(--font-display);
  font-size: 3rem;
  letter-spacing: 0.2em;
  color: var(--white);
  opacity: 0;
  animation: fadeUp 0.5s ease 0.2s forwards;
}
.loader-bar {
  width: 160px; height: 1px;
  background: rgba(255,255,255,0.08);
  position: relative; overflow: hidden;
}
.loader-bar::after {
  content: '';
  position: absolute; inset: 0;
  background: var(--acid);
  transform: translateX(-100%);
  animation: barSlide 0.9s ease 0.3s forwards;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes barSlide {
  from { transform: translateX(-100%); }
  to   { transform: translateX(0); }
}
@keyframes loaderOut {
  to { opacity:0; pointer-events:none; }
}

/* ---- NAME / CENTER ---- */
.name-center {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 50;
  pointer-events: none;
  transition: opacity 0.35s;
}
.name-center.hidden { opacity: 0; }

.name-main {
  font-family: var(--font-display);
  font-size: clamp(2rem, 3.5vw, 3rem);
  letter-spacing: 0.18em;
  color: var(--white);
  line-height: 1;
}
.name-sub {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 0.6rem;
}

/* ---- STAGE — two panels ---- */
.stage {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

/* ---- PANELS ---- */
.panel {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: none;
  transition: flex 0.65s cubic-bezier(0.76, 0, 0.24, 1);
  border-right: 1px solid var(--border);
  text-decoration: none;
}
.panel:last-child { border-right: none; }

.stage:has(.panel:hover) .panel       { flex: 0.6; }
.stage:has(.panel:hover) .panel:hover { flex: 1.4; }

/* backgrounds */
.panel-portfolio { background: var(--black); color: var(--white); }
.panel-research  { background: var(--paper); color: #1a1612; }

/* top accent bar */
.panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.55s cubic-bezier(0.76, 0, 0.24, 1);
}
.panel:hover::before { transform: scaleX(1); }
.panel-portfolio::before { background: var(--acid); }
.panel-research::before  { background: var(--red); }

/* ghost bg letter */
.panel-ghost {
  position: absolute;
  font-family: var(--font-display);
  font-size: clamp(14rem, 28vw, 28rem);
  line-height: 1;
  letter-spacing: -0.04em;
  pointer-events: none; user-select: none;
  bottom: -3rem; left: -2rem;
  transition: all 0.65s cubic-bezier(0.76, 0, 0.24, 1);
}
.panel-portfolio .panel-ghost { color: rgba(200,242,58,0.04); }
.panel-research  .panel-ghost { color: rgba(139,26,26,0.05); font-family: var(--font-serif); font-style: italic; }
.panel:hover .panel-ghost { transform: scale(1.05) translateY(-1.5rem); }
.panel-portfolio:hover .panel-ghost { color: rgba(200,242,58,0.08); }
.panel-research:hover  .panel-ghost { color: rgba(139,26,26,0.09); }

/* ---- PANEL INNER (icon + title) ---- */
.panel-inner {
  display: flex; flex-direction: column;
  align-items: center; gap: 1.5rem;
  position: relative; z-index: 2;
  transition: transform 0.4s ease;
}
.panel:hover .panel-inner { transform: translateY(-6px); }

/* Icon ring */
.panel-icon-wrap {
  width: 72px; height: 72px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.3s, background 0.3s, transform 0.4s;
}
.panel-research .panel-icon-wrap { border-color: rgba(26,22,18,0.12); }
.panel:hover .panel-icon-wrap { transform: scale(1.08); }
.panel-portfolio:hover .panel-icon-wrap { border-color: var(--acid); background: rgba(200,242,58,0.06); }
.panel-research:hover  .panel-icon-wrap { border-color: var(--red);  background: rgba(139,26,26,0.06); }

/* SVG icons */
.panel-icon { width: 28px; height: 28px; transition: fill 0.3s, stroke 0.3s; }
.panel-portfolio .panel-icon { fill: none; stroke: rgba(255,255,255,0.3); stroke-width: 1.5; }
.panel-portfolio:hover .panel-icon { stroke: var(--acid); }
.panel-research .panel-icon  { fill: none; stroke: rgba(26,22,18,0.3); stroke-width: 1.5; }
.panel-research:hover .panel-icon { stroke: var(--red); }

/* Title */
.panel-title {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 3vw, 2.8rem);
  letter-spacing: 0.12em;
  line-height: 1;
  text-align: center;
  transition: letter-spacing 0.4s;
}
.panel-research .panel-title {
  font-family: var(--font-serif);
  font-weight: 600;
  font-style: italic;
  letter-spacing: 0.02em;
  font-size: clamp(1.4rem, 2.5vw, 2.2rem);
}
.panel:hover .panel-title { letter-spacing: 0.18em; }
.panel-research:hover .panel-title { letter-spacing: 0.06em; }
.panel-portfolio:hover .panel-title { color: var(--acid); }
.panel-research:hover  .panel-title { color: var(--red); }

/* Arrow that appears on hover */
.panel-arrow {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.3s 0.1s, transform 0.3s 0.1s;
}
.panel:hover .panel-arrow { opacity: 0.5; transform: translateY(0); }
.panel-portfolio .panel-arrow { color: var(--acid); }
.panel-research  .panel-arrow { color: var(--red); }

/* ---- FOOTER ---- */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 42px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 3rem;
  border-top: 1px solid rgba(255,255,255,0.04);
  background: rgba(9,9,9,0.88);
  backdrop-filter: blur(12px);
  z-index: 200;
}
.footer-copy {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}
.footer-links { display: flex; gap: 1.75rem; }
.footer-a {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-a:hover { color: var(--white); }

/* ---- WAR ROOM FLASH ---- */
.war-flash {
  position: fixed; inset: 0;
  background: #00e676;
  z-index: 9995;
  opacity: 0;
  pointer-events: none;
  animation: warFlash 0.6s ease forwards;
}
@keyframes warFlash {
  0%   { opacity: 0; }
  20%  { opacity: 0.15; }
  100% { opacity: 0; }
}

/* ---- MOBILE ---- */
@media (max-width: 640px) {
  .stage { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  .panel { border-right: none; border-bottom: 1px solid var(--border); }
  .panel:last-child { border-bottom: none; }
  .stage:has(.panel:hover) .panel       { flex: 1; }
  .stage:has(.panel:hover) .panel:hover { flex: 1; }
  .panel-arrow { opacity: 0.4; transform: none; }
  body { cursor: auto; overflow: auto; }
  .cursor { display: none; }
  .name-center { display: none; }
  .panel-ghost { font-size: 7rem; }
  .footer { padding: 0 1.25rem; }
}
</style>
</head>

<!-- ===================== PANELS ===================== -->

<script>
// ---- Loader ----
window.addEventListener('load', () => {
  const l = document.getElementById('loader');
  setTimeout(() => {
    l.style.animation = 'loaderOut 0.45s ease forwards';
    setTimeout(() => l.remove(), 450);
  }, 1100);
});

// ---- Cursor ----
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
document.querySelectorAll('a, .panel').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('big'));
  el.addEventListener('mouseleave', () => cur.classList.remove('big'));
});

// ---- Hide name on hover ----
const badge = document.getElementById('nameBadge');
document.querySelectorAll('.panel').forEach(p => {
  p.addEventListener('mouseenter', () => badge.classList.add('hidden'));
  p.addEventListener('mouseleave', () => badge.classList.remove('hidden'));
});

// ---- Secret: type "war" to go to War Room ----
let typed = '';
document.addEventListener('keydown', e => {
  // ignore modifier keys
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  typed += e.key.toLowerCase();
  // keep only last 3 chars
  if (typed.length > 3) typed = typed.slice(-3);
  if (typed === 'war') {
    // flash green then navigate
    const flash = document.createElement('div');
    flash.className = 'war-flash';
    document.body.appendChild(flash);
    setTimeout(() => { window.location.href = './war_room.html'; }, 400);
  }
});
</script>
